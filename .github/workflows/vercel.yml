name: Vercel Deployment
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Vercel
        uses: vercel/vercel@v2
        with:
          repo: self
          dir: .
          token: ${{ secrets.VERCEL_TOKEN }}
