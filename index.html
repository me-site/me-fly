<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Nginx 服务器信息</title>

<style>
body{
width:40em;
margin:0 auto;
font-family:Tahoma,Verdana,Arial,sans-serif;
}

.info{
background:#f2f2f2;
padding:15px;
border-radius:8px;
margin-top:20px;
}
</style>

</head>

<body>

<h1>欢迎来到 Nginx！</h1>

<div class="info">

<p><b>服务器地址：</b> <span id="server"></span></p>

<p><b>访问域名：</b> <span id="host"></span></p>

<p><b>完整访问地址：</b> <span id="url"></span></p>

<p><b>访问者IP：</b> <span id="ip">检测中...</span></p>

</div>

<script>

document.getElementById("server").textContent = location.host;
document.getElementById("host").textContent = location.host;
document.getElementById("url").textContent = location.href;

fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(d=>{
document.getElementById("ip").textContent=d.ip;
});

</script>

</body>
</html>
